<!-- iOS Permission Gate -->
<div class="ios-permission-card" *ngIf="showIOSPermissionBtn">
  <div class="ios-perm-icon">
    <ion-icon name="compass-outline"></ion-icon>
  </div>
  <h3>Cần quyền truy cập cảm biến</h3>
  <p>
    iOS yêu cầu bạn cho phép ứng dụng truy cập
    cảm biến chuyển động để tính góc nghiêng.
  </p>
  <button class="ios-perm-btn" (click)="onRequestIOSPermission()">
    <ion-icon name="lock-open-outline"></ion-icon>
    Cho phép truy cập Motion
  </button>
</div>

<!-- Permission denied error -->
<div class="permission-error" *ngIf="permissionDenied">
  <ion-icon name="warning-outline"></ion-icon>
  <div>
    <strong>Quyền bị từ chối</strong>
    <p>
      Vào <strong>Settings → Safari → Motion & Orientation Access</strong>
      để bật lại, sau đó reload trang.
    </p>
  </div>
</div>
